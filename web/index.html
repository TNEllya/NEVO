<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NEVO VoIP Server Management Dashboard">
<title>NEVO — Server Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<a href="#content" class="skip-link">跳到主内容</a>

<div id="app">

  <!-- ====== Sidebar ====== -->
  <nav id="sidebar" role="navigation" aria-label="主导航">
    <div class="sidebar-logo">
      <div class="logo-icon" aria-hidden="true">N</div>
      <span class="logo-text">NEVO</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav">
      <a href="#dashboard" data-page="dashboard" class="active" aria-current="page">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
        仪表盘
      </a>
      <a href="#sessions" data-page="sessions">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="18" cy="9" r="2.5"/><path d="M18 15c-1.2 0-2.4.4-3.3 1.1l-3-1.6"/></svg></span>
        会话管理
      </a>
      <a href="#channels" data-page="channels">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        频道
      </a>
      <a href="#metrics" data-page="metrics">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg></span>
        性能监控
      </a>
      <a href="#config" data-page="config">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
        系统配置
      </a>
      <a href="#server" data-page="server">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg></span>
        服务器控制
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="status-dot" id="connection-status">
        <span class="dot" id="connection-dot"></span>
        <span id="connection-label">未连接</span>
      </div>
      <button class="btn small mobile-menu-btn" id="menu-close" style="width:100%" aria-label="关闭菜单">关闭菜单</button>
    </div>
  </nav>

  <!-- ====== Main Area ====== -->
  <div id="main-area">
    <header id="topbar">
      <div class="topbar-left">
        <button class="btn small mobile-menu-btn" id="menu-open" aria-label="打开菜单" style="margin-right:4px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="page-title" id="page-title">仪表盘</span>
      </div>
      <div class="topbar-right">
        <span id="uptime-display" class="badge neutral">—</span>
        <button class="btn danger small" id="btn-shutdown" aria-label="关闭服务器">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          关闭
        </button>
        <button class="btn small" id="btn-refresh" aria-label="刷新数据">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15.36-6.36L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15.36 6.36L3 16"/></svg>
          刷新
        </button>
      </div>
    </header>

    <main id="content" role="main">
      <!-- dynamically populated -->
    </main>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container" aria-live="polite"></div>

<!-- Modal placeholder -->
<div id="modal-root"></div>

<script src="js/app.js"></script>

</body>
</html>
